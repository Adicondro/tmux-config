# ============================================================
#  TMUX CONFIG
#  Prefix: C-s
# ============================================================

# ------------------------------------------------------------
# CORE / TERMINAL
# ------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -sg escape-time 0          # no ESC delay (vital for Neovim)
set -g focus-events on         # pass focus events to apps
set -g history-limit 50000     # scrollback buffer
set -g display-time 1500       # message display duration (ms)
set -g status-interval 5       # refresh status bar every 5s

# ------------------------------------------------------------
# KEYBINDINGS
# ------------------------------------------------------------
unbind r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"

set -g prefix C-s
unbind C-b
bind C-s send-prefix              # press C-s twice to send literal

# Pane navigation (vim-style)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resize (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Intuitive splits — stay in current dir
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current dir
bind c new-window -c "#{pane_current_path}"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Toggle zoom
bind z resize-pane -Z

# ------------------------------------------------------------
# WINDOWS & PANES
# ------------------------------------------------------------
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # auto-renumber on close

set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# ------------------------------------------------------------
# MOUSE
# ------------------------------------------------------------
set -g mouse on

# ------------------------------------------------------------
# VI COPY MODE
# ------------------------------------------------------------
setw -g mode-keys vi

bind Enter copy-mode              # Enter copy mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ------------------------------------------------------------
# STATUS BAR — Catppuccin
# ------------------------------------------------------------
set-option -g status-position top

# Window separators & fill
set -g @catppuccin_window_left_separator "◖"
set -g @catppuccin_window_right_separator "◗"
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Status modules
set -g @catppuccin_status_modules_right "directory date_time host session"
set -g @catppuccin_date_time_text "%H:%M"

set -g @catppuccin_status_left_separator  "◖"
set -g @catppuccin_status_right_separator "◗"
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# ------------------------------------------------------------
# PLUGINS
# ------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'          # system clipboard copy
set -g @plugin 'tmux-plugins/tmux-resurrect'     # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'     # auto-save sessions

# tmux-resurrect: restore Neovim sessions too
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 min & restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ============================================================
# Keep this line at the very bottom
run '~/.tmux/plugins/tpm/tpm'
# Other examples:

# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

